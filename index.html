<script>

// ── Logo ──
document.getElementById('logo-img').src = 'logo.jpg.png';

// ─────────────────────────────────────────────
// LOAD DATA FROM GOOGLE SHEETS
// ─────────────────────────────────────────────

let people = [];
let byName = {};
let roots = [];

const collapsed = new Set();
const allNodes = [];

const canvas = document.getElementById('org-canvas');

async function loadPeople() {

  const SHEET_ID =
    '1kO9rERWJgxg-OXUn8vOsnx2UydEWWU6P88J23Yhuqi4';

  const SHEET_NAME = 'Sheet1';

  const url =
    `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

  try {

    const response = await fetch(url);

    const data = await response.json();

    people = data
      .filter(row => row.Name && row.Name.trim() !== '')
      .map(row => ({

        name:
          (row.Name || '').trim(),

        title:
          (row.Title || '').trim(),

        manager:
          row['Direct manager'] &&
          row['Direct manager'].trim() !== '-' &&
          row['Direct manager'].trim() !== ''
            ? row['Direct manager'].trim()
            : null,

        level:
          row['Hierarchy Level'] &&
          row['Hierarchy Level'].trim() !== ''
            ? Number(row['Hierarchy Level'])
            : null

      }));

    buildTree();

  } catch (err) {

    console.error(
      'Failed loading Google Sheet:',
      err
    );

  }
}

// ─────────────────────────────────────────────
// BUILD TREE
// ─────────────────────────────────────────────

function buildTree() {

  byName = {};
  roots = [];

  people.forEach(p => {

    byName[p.name] = {
      ...p,
      children: []
    };

  });

  people.forEach(p => {

    const node = byName[p.name];

    if (
      !p.manager ||
      !byName[p.manager]
    ) {

      roots.push(node);

    } else {

      byName[p.manager]
        .children
        .push(node);

    }

  });

  allNodes.length = 0;

  canvas.innerHTML = '';

  roots.forEach(root => {

    canvas.appendChild(
      buildNode(root)
    );

  });

  canvas.style.transform = 'scale(0.8)';

  collapseAll();
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

const COLORS = [
  '#0d3b6e',
  '#1565c0',
  '#00acc1',
  '#42a5f5',
  '#7ec8e3',
  '#90caf9'
];

function levelColor(lvl) {

  return COLORS[
    Math.min(lvl, COLORS.length - 1)
  ];

}

function initials(name) {

  return name
    .replace(/_TL\d+$/,'')
    .split(' ')
    .filter(Boolean)
    .slice(0, 2)
    .map(w => w[0].toUpperCase())
    .join('');

}

function shortName(name) {

  const clean =
    name.replace(/_TL\d+$/,'');

  const parts =
    clean.split(' ').filter(Boolean);

  return parts.length <= 3
    ? clean
    : parts[0] +
      ' ' +
      parts[1] +
      ' ' +
      parts[parts.length - 1];

}

function badgeLabel(lvl) {

  return [
    'Executive',
    'Director',
    'Manager',
    'Senior',
    'Team Leader',
    'Staff'
  ][Math.min(lvl, 5)];

}

// ─────────────────────────────────────────────
// BUILD NODE
// ─────────────────────────────────────────────

function buildNode(node) {

  allNodes.push(node);

  const level =
    node.level !== null &&
    !isNaN(node.level)
      ? node.level
      : 5;

  const wrap =
    document.createElement('div');

  wrap.className =
    `node lvl-${Math.min(level, 5)}`;

  wrap.dataset.name =
    node.name
      .replace(/_TL\d+$/,'')
      .toLowerCase();

  wrap.dataset.title =
    node.title.toLowerCase();

  const card =
    document.createElement('div');

  card.className = 'card';

  card.innerHTML = `
    <div
      class="card-avatar"
      style="
        background:
        linear-gradient(
          135deg,
          ${levelColor(level)},
          ${levelColor(level + 1)}
        )
      "
    >
      ${initials(node.name)}
    </div>

    <div class="card-name">
      ${shortName(node.name)}
    </div>

    <div class="card-title">
      ${node.title}
    </div>

    <div class="card-badge">
      ${badgeLabel(level)}
    </div>
  `;

  wrap.appendChild(card);

  // ── CHILDREN ──

  if (node.children.length > 0) {

    const btn =
      document.createElement('div');

    btn.className =
      'collapse-btn';

    btn.title =
      'Expand / Collapse';

    btn.textContent = '−';

    card.appendChild(btn);

    const childrenWrap =
      document.createElement('div');

    childrenWrap.className =
      'children-wrap';

    const vLine =
      document.createElement('div');

    vLine.className = 'v-line';

    childrenWrap.appendChild(vLine);

    const row =
      document.createElement('div');

    row.className =
      'children-row';

    node.children.forEach(child => {

      const col =
        document.createElement('div');

      col.className =
        'child-col';

      const vl =
        document.createElement('div');

      vl.className = 'v-line';

      col.appendChild(vl);

      col.appendChild(
        buildNode(child)
      );

      row.appendChild(col);

    });

    childrenWrap.appendChild(row);

    wrap.appendChild(childrenWrap);

    node._childrenWrap =
      childrenWrap;

    node._btn = btn;

    btn.addEventListener(
      'click',
      e => {

        e.stopPropagation();

        toggleNode(
          node.name,
          childrenWrap,
          btn
        );

      }
    );
  }

  node._el = wrap;

  return wrap;
}

// ─────────────────────────────────────────────
// COLLAPSE / EXPAND
// ─────────────────────────────────────────────

function toggleNode(
  name,
  wrap,
  btn
) {

  if (collapsed.has(name)) {

    collapsed.delete(name);

    wrap.style.display = '';

    btn.textContent = '−';

  } else {

    collapsed.add(name);

    wrap.style.display = 'none';

    btn.textContent = '+';

  }
}

function expandAll() {

  collapsed.clear();

  allNodes.forEach(n => {

    if (n._childrenWrap) {

      n._childrenWrap.style.display = '';

      n._btn.textContent = '−';

    }

  });
}

function collapseAll() {

  allNodes.forEach(n => {

    if (
      n._childrenWrap &&
      n.manager
    ) {

      collapsed.add(n.name);

      n._childrenWrap.style.display =
        'none';

      n._btn.textContent = '+';

    }

  });
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────

function revealAncestors(node) {

  let current = node;

  while (current.manager) {

    const mgr =
      byName[current.manager];

    if (!mgr) break;

    if (
      mgr._childrenWrap &&
      collapsed.has(mgr.name)
    ) {

      collapsed.delete(mgr.name);

      mgr._childrenWrap.style.display =
        '';

      mgr._btn.textContent = '−';

    }

    current = mgr;
  }
}

function doSearch(q) {

  const term =
    q.toLowerCase().trim();

  allNodes.forEach(n => {

    if (n._el) {

      n._el
        .querySelector('.card')
        .classList
        .remove('highlight');

    }

  });

  if (!term) return;

  const found =
    allNodes.find(n => {

      const name =
        n._el.dataset.name || '';

      const title =
        n._el.dataset.title || '';

      return (
        name.includes(term) ||
        title.includes(term)
      );

    });

  if (!found) return;

  revealAncestors(found);

  const card =
    found._el.querySelector('.card');

  card.classList.add('highlight');

  const zoom = 1;

  canvas.style.transform =
    `scale(${zoom})`;

  slider.value = zoom * 100;

  zoomLabel.textContent =
    `${zoom * 100}%`;

  setTimeout(() => {

    const wrap =
      document.getElementById(
        'canvas-wrap'
      );

    const cardRect =
      card.getBoundingClientRect();

    const wrapRect =
      wrap.getBoundingClientRect();

    const offsetLeft =
      cardRect.left -
      wrapRect.left +
      wrap.scrollLeft;

    const offsetTop =
      cardRect.top -
      wrapRect.top +
      wrap.scrollTop;

    wrap.scrollTo({

      left:
        offsetLeft -
        wrap.clientWidth / 2 +
        cardRect.width / 2,

      top:
        offsetTop -
        wrap.clientHeight / 2 +
        cardRect.height / 2,

      behavior: 'smooth'

    });

  }, 300);
}

// ─────────────────────────────────────────────
// ZOOM
// ─────────────────────────────────────────────

const slider =
  document.getElementById(
    'zoom-slider'
  );

const zoomLabel =
  document.getElementById(
    'zoom-label'
  );

slider.addEventListener(
  'input',
  () => {

    const z =
      slider.value / 100;

    canvas.style.transform =
      `scale(${z})`;

    zoomLabel.textContent =
      slider.value + '%';

  }
);

// ─────────────────────────────────────────────
// SEARCH INPUT
// ─────────────────────────────────────────────

document
  .getElementById('search')
  .addEventListener(
    'input',
    function() {

      doSearch(this.value);

    }
  );

// ─────────────────────────────────────────────
// INITIAL LOAD
// ─────────────────────────────────────────────

loadPeople();

</script>
