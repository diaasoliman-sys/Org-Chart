<script>

// ─────────────────────────────────────────────
// LOGO
// ─────────────────────────────────────────────

document.getElementById('logo-img').src = 'logo.jpg.png';

// ─────────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────────

let people = [];
let byName = {};
let roots = [];

const collapsed = new Set();
const allNodes = [];

const canvas =
  document.getElementById('org-canvas');

const slider =
  document.getElementById('zoom-slider');

const zoomLabel =
  document.getElementById('zoom-label');

// ─────────────────────────────────────────────
// LOAD GOOGLE SHEET
// ─────────────────────────────────────────────

async function loadPeople() {

  const SHEET_ID =
    '1kO9rERWJgxg-OXUn8vOsnx2UydEWWU6P88J23Yhuqi4';

  const SHEET_NAME =
    'Sheet1';

  const url =
    `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

  try {

    const response =
      await fetch(url);

    const data =
      await response.json();

    people = data
      .filter(row =>
        row.Name &&
        row.Name.trim() !== ''
      )
      .map(row => ({

        name:
          (row.Name || '')
            .trim(),

        title:
          (row.Title || '')
            .trim(),

        manager:
          row['Direct manager'] &&
          row['Direct manager']
            .trim() !== '-' &&
          row['Direct manager']
            .trim() !== ''
            ? row['Direct manager']
                .trim()
            : null,

        level:
          row['Hierarchy Level'] &&
          row['Hierarchy Level']
            .trim() !== ''
            ? Number(
                row['Hierarchy Level']
              )
            : 5

      }));

    buildTree();

  } catch (err) {

    console.error(
      'Error loading sheet:',
      err
    );

  }
}

// ─────────────────────────────────────────────
// BUILD TREE
// ─────────────────────────────────────────────

function buildTree() {

  byName = {};
  roots = [];

  people.forEach(person => {

    byName[person.name] = {

      ...person,

      children: []

    };

  });

  people.forEach(person => {

    const node =
      byName[person.name];

    if (
      !person.manager ||
      !byName[person.manager]
    ) {

      roots.push(node);

    } else {

      byName[person.manager]
        .children
        .push(node);

    }

  });

  canvas.innerHTML = '';

  allNodes.length = 0;

  roots.forEach(root => {

    canvas.appendChild(
      buildNode(root)
    );

  });

  canvas.style.transform =
    'scale(0.8)';

  collapseAll();
}

// ─────────────────────────────────────────────
// COLORS
// ─────────────────────────────────────────────

const COLORS = [

  '#0d3b6e',
  '#1565c0',
  '#00acc1',
  '#42a5f5',
  '#7ec8e3',
  '#90caf9'

];

function levelColor(level) {

  return COLORS[
    Math.min(level, 5)
  ];

}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

function initials(name) {

  return (name || '')
    .replace(/_TL\d+$/,'')
    .split(' ')
    .filter(Boolean)
    .slice(0, 2)
    .map(w => w[0].toUpperCase())
    .join('');

}

function shortName(name) {

  const clean =
    (name || '')
      .replace(/_TL\d+$/,'');

  const parts =
    clean
      .split(' ')
      .filter(Boolean);

  if (parts.length <= 3)
    return clean;

  return (
    parts[0] +
    ' ' +
    parts[1] +
    ' ' +
    parts[parts.length - 1]
  );

}

function badgeLabel(level) {

  return [

    'Executive',
    'Director',
    'Manager',
    'Senior',
    'Team Leader',
    'Staff'

  ][Math.min(level, 5)];

}

// ─────────────────────────────────────────────
// BUILD NODE
// ─────────────────────────────────────────────

function buildNode(node) {

  allNodes.push(node);

  const level =
    node.level !== null &&
    !isNaN(node.level)
      ? Number(node.level)
      : 5;

  const wrap =
    document.createElement('div');

  wrap.className =
    `node lvl-${Math.min(level, 5)}`;

  wrap.dataset.name =
    (node.name || '')
      .toLowerCase();

  wrap.dataset.title =
    (node.title || '')
      .toLowerCase();

  // ── CARD ──

  const card =
    document.createElement('div');

  card.className = 'card';

  card.innerHTML = `

    <div
      class="card-avatar"
      style="
        background:
        linear-gradient(
          135deg,
          ${levelColor(level)},
          ${levelColor(
            Math.min(level + 1, 5)
          )}
        )
      "
    >

      ${initials(node.name)}

    </div>

    <div class="card-name">

      ${shortName(node.name)}

    </div>

    <div class="card-title">

      ${node.title || ''}

    </div>

    <div class="card-badge">

      ${badgeLabel(level)}

    </div>

  `;

  wrap.appendChild(card);

  // ─────────────────────────
  // CHILDREN
  // ─────────────────────────

  if (
    node.children &&
    node.children.length > 0
  ) {

    const btn =
      document.createElement('div');

    btn.className =
      'collapse-btn';

    btn.textContent = '−';

    btn.title =
      'Expand / Collapse';

    card.appendChild(btn);

    const childrenWrap =
      document.createElement('div');

    childrenWrap.className =
      'children-wrap';

    const vLine =
      document.createElement('div');

    vLine.className = 'v-line';

    childrenWrap.appendChild(vLine);

    const row =
      document.createElement('div');

    row.className =
      'children-row';

    node.children.forEach(child => {

      const col =
        document.createElement('div');

      col.className =
        'child-col';

      const childLine =
        document.createElement('div');

      childLine.className =
        'v-line';

      col.appendChild(childLine);

      col.appendChild(
        buildNode(child)
      );

      row.appendChild(col);

    });

    childrenWrap.appendChild(row);

    wrap.appendChild(childrenWrap);

    node._childrenWrap =
      childrenWrap;

    node._btn = btn;

    btn.addEventListener(
      'click',
      e => {

        e.stopPropagation();

        toggleNode(
          node.name,
          childrenWrap,
          btn
        );

      }
    );
  }

  node._el = wrap;

  return wrap;
}

// ─────────────────────────────────────────────
// TOGGLE
// ─────────────────────────────────────────────

function toggleNode(
  name,
  wrap,
  btn
) {

  if (collapsed.has(name)) {

    collapsed.delete(name);

    wrap.style.display = '';

    btn.textContent = '−';

  } else {

    collapsed.add(name);

    wrap.style.display = 'none';

    btn.textContent = '+';

  }
}

// ─────────────────────────────────────────────
// EXPAND / COLLAPSE ALL
// ─────────────────────────────────────────────

function expandAll() {

  collapsed.clear();

  allNodes.forEach(node => {

    if (node._childrenWrap) {

      node._childrenWrap
        .style.display = '';

      node._btn.textContent = '−';

    }

  });
}

function collapseAll() {

  allNodes.forEach(node => {

    if (
      node._childrenWrap &&
      node.manager
    ) {

      collapsed.add(node.name);

      node._childrenWrap
        .style.display = 'none';

      node._btn.textContent = '+';

    }

  });
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────

function revealAncestors(node) {

  let current = node;

  while (current.manager) {

    const mgr =
      byName[current.manager];

    if (!mgr) break;

    if (
      mgr._childrenWrap &&
      collapsed.has(mgr.name)
    ) {

      collapsed.delete(mgr.name);

      mgr._childrenWrap
        .style.display = '';

      mgr._btn.textContent = '−';

    }

    current = mgr;
  }
}

function doSearch(query) {

  const term =
    query.toLowerCase().trim();

  allNodes.forEach(node => {

    if (node._el) {

      node._el
        .querySelector('.card')
        .classList
        .remove('highlight');

    }

  });

  if (!term) return;

  const found =
    allNodes.find(node => {

      const name =
        node._el.dataset.name || '';

      const title =
        node._el.dataset.title || '';

      return (
        name.includes(term) ||
        title.includes(term)
      );

    });

  if (!found) return;

  revealAncestors(found);

  const card =
    found._el.querySelector('.card');

  card.classList.add('highlight');

  const zoom = 1;

  canvas.style.transform =
    `scale(${zoom})`;

  slider.value = 100;

  zoomLabel.textContent = '100%';

  setTimeout(() => {

    const wrap =
      document.getElementById(
        'canvas-wrap'
      );

    const cardRect =
      card.getBoundingClientRect();

    const wrapRect =
      wrap.getBoundingClientRect();

    const offsetLeft =
      cardRect.left -
      wrapRect.left +
      wrap.scrollLeft;

    const offsetTop =
      cardRect.top -
      wrapRect.top +
      wrap.scrollTop;

    wrap.scrollTo({

      left:
        offsetLeft -
        wrap.clientWidth / 2 +
        cardRect.width / 2,

      top:
        offsetTop -
        wrap.clientHeight / 2 +
        cardRect.height / 2,

      behavior: 'smooth'

    });

  }, 300);
}

// ─────────────────────────────────────────────
// ZOOM
// ─────────────────────────────────────────────

slider.addEventListener(
  'input',
  () => {

    const zoom =
      slider.value / 100;

    canvas.style.transform =
      `scale(${zoom})`;

    zoomLabel.textContent =
      slider.value + '%';

  }
);

// ─────────────────────────────────────────────
// SEARCH INPUT
// ─────────────────────────────────────────────

document
  .getElementById('search')
  .addEventListener(
    'input',
    function() {

      doSearch(this.value);

    }
  );

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────

loadPeople();

</script>
